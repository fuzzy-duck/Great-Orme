<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Great Orme Client Preview</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        overflow: hidden;
        background: #e7ece8;
        color: #18211c;
        font-family: "Avenir Next", "Gill Sans", sans-serif;
      }

      .preview-shell {
        display: grid;
        justify-items: center;
        gap: 18px;
        width: 100vw;
        height: 100vh;
        padding: 24px;
      }

      .preview-heading {
        display: grid;
        gap: 4px;
        text-align: center;
      }

      .preview-heading h1,
      .preview-heading p {
        margin: 0;
      }

      .preview-heading h1 {
        font-size: 2rem;
        line-height: 1;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .preview-heading p {
        font-size: 1rem;
        letter-spacing: 0.12em;
      }

      .preview-frame {
        width: calc(1920px * var(--preview-scale));
        height: calc(1080px * var(--preview-scale));
        border: 2px solid #4d5d51;
        background: #ffffff;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.14);
        overflow: hidden;
      }

      .preview-screen {
        width: 1920px;
        height: 1080px;
        border: 0;
        display: block;
        transform: scale(var(--preview-scale, 0.8));
        transform-origin: top left;
      }
    </style>
  </head>
  <body>
    <main class="preview-shell">
      <header class="preview-heading">
        <h1>Client Preview</h1>
        <p>09-04-26</p>
        <p>1920 x 1080</p>
      </header>
      <div class="preview-frame">
        <iframe class="preview-screen" src="index.html" title="Great Orme client preview" scrolling="no"></iframe>
      </div>
    </main>
    <script>
      const root = document.documentElement;

      function fitPreview() {
        const maxScale = 0.8;
        const horizontalPadding = 48;
        const reservedHeight = 170;
        const scale = Math.min(
          maxScale,
          (window.innerWidth - horizontalPadding) / 1920,
          (window.innerHeight - reservedHeight) / 1080
        );

        root.style.setProperty('--preview-scale', `${Math.max(scale, 0.1)}`);
      }

      fitPreview();
      window.addEventListener('resize', fitPreview);
    </script>
  </body>
</html>
