<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Great Orme Client Preview</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        overflow: hidden;
        background: #111111;
      }

      .preview-screen {
        width: min(100vw, calc(100vh * 16 / 9));
        aspect-ratio: 16 / 9;
        height: auto;
        border: 0;
        display: block;
      }
    </style>
  </head>
  <body>
    <iframe class="preview-screen" src="index.html" title="Great Orme client preview"></iframe>
  </body>
</html>
