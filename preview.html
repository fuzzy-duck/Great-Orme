<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Great Orme Client Preview</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        overflow: hidden;
        background: #e7ece8;
        color: #18211c;
        font-family: "Avenir Next", "Gill Sans", sans-serif;
      }

      .preview-shell {
        display: grid;
        justify-items: center;
        gap: 18px;
        width: 100vw;
        height: 100vh;
        padding: 24px;
      }

      .preview-heading {
        display: grid;
        gap: 4px;
        text-align: center;
      }

      .preview-heading h1,
      .preview-heading p {
        margin: 0;
      }

      .preview-heading h1 {
        font-size: 2rem;
        line-height: 1;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .preview-heading p {
        font-size: 1rem;
        letter-spacing: 0.12em;
      }

      .preview-frame {
        width: min(calc(100vw - 48px), calc((100vh - 132px) * 16 / 9), 1632px);
        aspect-ratio: 16 / 9;
        border: 2px solid #4d5d51;
        background: #ffffff;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.14);
        overflow: hidden;
      }

      .preview-screen {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }
    </style>
  </head>
  <body>
    <main class="preview-shell">
      <header class="preview-heading">
        <h1>Client Preview</h1>
        <p>09-04-26</p>
        <p>1920 x 1080</p>
      </header>
      <div class="preview-frame">
        <iframe class="preview-screen" src="index.html" title="Great Orme client preview" scrolling="no"></iframe>
      </div>
    </main>
  </body>
</html>
